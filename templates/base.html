<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}番剧年表{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/halfmoon@2.0.2/css/halfmoon.min.css" rel="stylesheet"
          integrity="sha256-RjeFzczeuZHCyS+Gvz+kleETzBF/o84ZRHukze/yv6o=" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="ps-md-sbwidth" id="appBody">

<!-- Sidebar -->
<nav class="sidebar offcanvas-start offcanvas-md" tabindex="-1" id="sidebar">
    <div class="offcanvas-header border-bottom border-secondary border-opacity-25">
        <a class="sidebar-brand fw-bold fs-5" href="/" id="sidebarBrand">番剧年表</a>
        <button type="button" class="btn-close d-md-none" data-bs-dismiss="offcanvas" data-bs-target="#sidebar" aria-label="Close"></button>
        <button type="button" class="btn btn-sm d-none d-md-inline-flex sidebar-collapse-btn" id="sidebarCollapseBtn" onclick="collapseSidebar()" title="收起侧栏">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M11.854 3.646a.5.5 0 0 1 0 .708L8.207 8l3.647 3.646a.5.5 0 0 1-.708.708l-4-4a.5.5 0 0 1 0-.708l4-4a.5.5 0 0 1 .708 0z"/></svg>
        </button>
    </div>
    <div class="offcanvas-body d-flex flex-column">
        <ul class="sidebar-nav">
            <li><h6 class="sidebar-header">导航</h6></li>
            <li><hr class="sidebar-divider"></li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/' }}" href="/">
                    仪表盘
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/browse' }}" href="/browse">
                    浏览
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/collect' }}" href="/collect">
                    收集
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link {{ 'active' if request.path == '/export' }}" href="/export">
                    导出
                </a>
            </li>
        </ul>
        <hr class="sidebar-divider mt-auto">
        <div class="px-3 pb-2 d-flex align-items-center justify-content-between">
            <div>
                <small class="text-body-secondary">Bangumi 数据驱动</small><br>
                <small class="text-body-secondary">1975–2026 · 21,087 部</small>
            </div>
            <button type="button" class="btn btn-sm theme-toggle-btn" id="themeToggle" onclick="toggleTheme()" title="切换主题">
                <svg id="themeIconMoon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/></svg>
                <svg id="themeIconSun" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="display:none"><path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/></svg>
            </button>
        </div>
    </div>
</nav>

<!-- Restore button (visible when sidebar is collapsed on md+) -->
<button type="button" class="btn sidebar-expand-btn d-none" id="sidebarExpandBtn" onclick="expandSidebar()" title="展开侧栏">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path fill-rule="evenodd" d="M4.146 3.646a.5.5 0 0 0 0 .708L7.793 8l-3.647 3.646a.5.5 0 0 0 .708.708l4-4a.5.5 0 0 0 0-.708l-4-4a.5.5 0 0 0-.708 0z"/></svg>
</button>

<!-- Main content -->
<div class="container-fluid p-4 p-md-5">
    <!-- Mobile toggle -->
    <button type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar"
            class="btn d-md-none mb-3 mobile-menu-btn">
        菜单
    </button>

    {% block content %}{% endblock %}
</div>

<!-- Toast container -->
<div class="toast-container position-fixed top-0 end-0 p-3" id="toasts" style="z-index:1100"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha256-FLgYKmI8Sdy+ZbzaKt0P7eOETPpWhlKZPpJqi9O2K1A=" crossorigin="anonymous"></script>

<script>
function toast(msg, type='success') {
    const id = 't' + Date.now();
    const html = `<div id="${id}" class="toast align-items-center border-0" role="alert">
        <div class="d-flex"><div class="toast-body">${msg}</div>
        <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
        </div></div>`;
    document.getElementById('toasts').insertAdjacentHTML('beforeend', html);
    new bootstrap.Toast(document.getElementById(id), {delay:2500}).show();
}

async function api(method, url, body) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(url, opts);
    return res.json();
}

// Theme toggle
function isDark() {
    return document.documentElement.getAttribute('data-bs-theme') === 'dark';
}

function setTheme(dark) {
    document.documentElement.setAttribute('data-bs-theme', dark ? 'dark' : 'light');
    document.getElementById('themeIconMoon').style.display = dark ? '' : 'none';
    document.getElementById('themeIconSun').style.display = dark ? 'none' : '';
    localStorage.setItem('theme', dark ? 'dark' : 'light');
    window.dispatchEvent(new CustomEvent('themechange', { detail: { dark } }));
}

function toggleTheme() {
    setTheme(!isDark());
}

// Sidebar collapse/expand (desktop only)
function collapseSidebar() {
    const sidebar = document.getElementById('sidebar');
    const body = document.getElementById('appBody');
    const expandBtn = document.getElementById('sidebarExpandBtn');
    sidebar.classList.add('sidebar-collapsed');
    body.classList.remove('ps-md-sbwidth');
    body.classList.add('ps-md-sbwidth-collapsed');
    expandBtn.classList.remove('d-none');
    localStorage.setItem('sidebarCollapsed', 'true');
}

function expandSidebar() {
    const sidebar = document.getElementById('sidebar');
    const body = document.getElementById('appBody');
    const expandBtn = document.getElementById('sidebarExpandBtn');
    sidebar.classList.remove('sidebar-collapsed');
    body.classList.remove('ps-md-sbwidth-collapsed');
    body.classList.add('ps-md-sbwidth');
    expandBtn.classList.add('d-none');
    localStorage.setItem('sidebarCollapsed', 'false');
}

// Restore state on load
(function() {
    const saved = localStorage.getItem('theme');
    setTheme(saved !== 'light');
    if (localStorage.getItem('sidebarCollapsed') === 'true') {
        collapseSidebar();
    }
})();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
